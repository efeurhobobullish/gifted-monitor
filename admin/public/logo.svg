<svg
  viewBox="0 0 48 48"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="EmpireHost logo"
>
  <defs>
    <linearGradient id="empireBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#367CF4"/>
      <stop offset="100%" stop-color="#1F5FD6"/>
    </linearGradient>
  </defs>

  <!-- Vertical spine -->
  <rect
    x="6"
    y="6"
    width="10"
    height="36"
    rx="4"
    fill="url(#empireBlue)"
  />

  <!-- Top bar -->
  <rect
    x="18"
    y="6"
    width="24"
    height="8"
    rx="4"
    fill="#367CF4"
  />

  <!-- Middle bar -->
  <rect
    x="18"
    y="20"
    width="18"
    height="8"
    rx="4"
    fill="#367CF4"
    opacity="0.85"
  />

  <!-- Bottom bar -->
  <rect
    x="18"
    y="34"
    width="24"
    height="8"
    rx="4"
    fill="#367CF4"
  />
</svg>